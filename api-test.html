<!DOCTYPE html><html><head><meta charset="UTF-8"><title>API Test</title></head><body>
<h1>Agnes API Test</h1><button onclick="test()">Test API</button><pre id="out"></pre>
<script>
async function test() {
  const out = document.getElementById('out');
  out.textContent = 'Testing...';
  try {
    const r = await fetch('https://apihub.agnes-ai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': '***'
      },
      body: JSON.stringify({ model: 'agnes-2.0-flash', messages: [{ role: 'user', content: 'hi' }], max_tokens: 50 })
    });
    const d = await r.text();
    out.textContent = 'Status: ' + r.status + '\n' + d.substring(0, 500);
  } catch(e) { out.textContent = 'Error: ' + e.message; }
}
</script></body></html>
